name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant gradlew executable permission
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Build release APK (signed with debug key)
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Rename APKs
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk          artifacts/BitZeroDownloader-debug.apk
          cp app/build/outputs/apk/release/app-release.apk      artifacts/BitZeroDownloader-release.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BitZeroDownloader-debug
          path: artifacts/BitZeroDownloader-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: BitZeroDownloader-release
          path: artifacts/BitZeroDownloader-release.apk

      - name: Create GitHub Release with APKs
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: BitZeroDownloader build #${{ github.run_number }}
          body: |
            APK compilada automáticamente por GitHub Actions.
            
            - **BitZeroDownloader-release.apk** ← recomendada para instalar
            - BitZeroDownloader-debug.apk ← versión debug
            
            Commit: ${{ github.sha }}
          files: |
            artifacts/BitZeroDownloader-debug.apk
            artifacts/BitZeroDownloader-release.apk
